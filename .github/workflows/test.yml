name: SIMD Feature Matrix Testing

on:
  push:
    branches: [ "main", "perf/tag-parsing" ]
  pull_request:
    branches: [ "main", "perf/tag-parsing" ]

permissions:
  contents: read

jobs:
  test-simd-matrix:
    name: Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- x86_64 Targets (Run natively on GitHub host) ---
          - name: x86_64 - SSE2 Only
            target: x86_64-unknown-linux-gnu
            rustflags: "-C target-feature=+sse2"
            use_cross: false

          - name: x86_64 - AVX2
            target: x86_64-unknown-linux-gnu
            rustflags: "-C target-feature=+sse2,+avx2"
            use_cross: false

          - name: x86_64 - AVX-512
            target: x86_64-unknown-linux-gnu
            rustflags: "-C target-feature=+sse2,+avx2,+avx512f,+avx512bw"
            use_cross: false

          # --- AArch64 Targets (Run via Emulation) ---
          - name: ARM64 - NEON
            target: aarch64-unknown-linux-gnu
            rustflags: "-C target-feature=+neon"
            use_cross: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up QEMU Emulation (ARM Only)
        if: ${{ matrix.use_cross }}
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static

      - name: Install Cross-rs (ARM Only)
        if: ${{ matrix.use_cross }}
        run: cargo install cross

      # Native testing for x86_64 blocks
      - name: Run Native Tests
        if: ${{ !matrix.use_cross }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo test --target ${{ matrix.target }}

      # Emulated testing for ARM blocks
      - name: Run Emulated Tests
        if: ${{ matrix.use_cross }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cross test --target ${{ matrix.target }}
